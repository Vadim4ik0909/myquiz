<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Ультра-Тренажер 120%</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #252538;
            --text: #cdd6f4;
            --subtext: #a6adc8;
            --accent: #89b4fa;
            --green: #a6e3a1;
            --red: #f38ba8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .quiz-container { background: var(--surface); width: 100%; max-width: 500px; padding: 30px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); text-align: center; }
        .progress { font-size: 14px; color: var(--subtext); margin-bottom: 10px; }
        .title { font-size: 16px; color: var(--subtext); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .word { font-size: 28px; font-weight: bold; color: var(--accent); margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 14px; font-size: 18px; border-radius: 8px; border: 2px solid #313244; background: #313244; color: var(--text); text-align: center; margin-bottom: 20px; outline: none; transition: border 0.2s; }
        input[type="text"]:focus { border-color: var(--accent); }
        button { width: 100%; padding: 14px; font-size: 16px; font-weight: bold; background: var(--accent); color: #11111b; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        .result { font-size: 16px; font-weight: bold; margin-top: 20px; min-height: 24px; }
        .success { color: var(--green); }
        .error { color: var(--red); }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <div class="progress" id="progress">Картка: 1 з 10</div>
    <div class="title">Як перекласти англійською:</div>
    <div class="word" id="target-word">Завантаження...</div>
    <input type="text" id="user-input" placeholder="Введи 3 форми через пробіл" autocomplete="off" autocapitalize="none">
    <button id="action-btn" onclick="handleSubmit()">Перевірити</button>
    <div class="result" id="result-msg"></div>
</div>

<script>
    // Твоя база слів
    const WORDS_BASE = {
        "arise arose arisen": "виникати, з'являтися",
        "awake awoke awoken": "прокидатися",
        "be was were been": "бути",
        "bear bore borne": "носити, переносити",
        "beat beat beaten": "бити, калатати",
        "become became become": "ставати, робитися",
        "befall befell befallen": "траплятися",
        "begin began begun": "починати, починатися",
        "behold beheld beheld": "бачити, помічати",
        "bend bent bent": "згинати, гнути"
    };

    let questions = Object.entries(WORDS_BASE);
    // Перемішування масиву (ADHD-рандом)
    questions.sort(() => Math.random() - 0.5);

    let currentIndex = 0;
    let score = 0;
    let isShowingAnswer = false;

    const progressEl = document.getElementById('progress');
    const wordEl = document.getElementById('target-word');
    const inputEl = document.getElementById('user-input');
    const btnEl = document.getElementById('action-btn');
    const msgEl = document.getElementById('result-msg');

    function showQuestion() {
        if (currentIndex < questions.length) {
            progressEl.innerText = `Картка: ${currentIndex + 1} з ${questions.length}`;
            wordEl.innerText = questions[currentIndex][1];
            inputEl.value = '';
            inputEl.disabled = false;
            msgEl.innerText = '';
            btnEl.innerText = 'Перевірити';
            isShowingAnswer = false;
            // Фокус на полі (зручно на ПК, на телефоні відкриє клавіатуру)
            setTimeout(() => inputEl.focus(), 50);
        } else {
            const percent = Math.round((score / questions.length) * 100);
            document.getElementById('quiz-box').innerHTML = `
                <div class="word" style="color: var(--green)">Фініш! 🔥</div>
                <div class="result" style="margin-bottom: 20px;">Твій результат: ${score} з ${questions.length}<br>Точність: ${percent}%</div>
                <button onclick="location.reload()">Пройти ще раз</button>
            `;
        }
    }

    function handleSubmit() {
        if (!isShowingAnswer) {
            const userAns = inputEl.value.trim().toLowerCase().replace(/\s+/g, ' ');
            const correctAns = questions[currentIndex][0].toLowerCase();

            inputEl.disabled = true;
            isShowingAnswer = true;

            if (userAns === correctAns) {
                score++;
                msgEl.className = 'result success';
                msgEl.innerText = '🔥 Правильно! +1 до дофаміну!';
                btnEl.innerText = 'Далі';
            } else {
                msgEl.className = 'result error';
                msgEl.innerText = `❌ Помилка! Правильно: ${questions[currentIndex][0]}`;
                btnEl.innerText = 'Далі';
            }
        } else {
            currentIndex++;
            showQuestion();
        }
    }

    // Дозволяємо надсилати по кнопці Enter на клавіатурі
    inputEl.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            handleSubmit();
        }
    });

    // Запуск першого запитання
    showQuestion();
</script>

</body>
</html>
