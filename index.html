<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Квіз-Платформа 120%</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #252538;
            --text: #cdd6f4;
            --subtext: #a6adc8;
            --accent: #89b4fa;
            --green: #a6e3a1;
            --red: #f38ba8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: var(--surface); width: 100%; max-width: 550px; padding: 30px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .screen { display: none; text-align: center; }
        .screen.active { display: block; }
        
        h1, h2 { margin-bottom: 20px; color: var(--accent); }
        p { color: var(--subtext); margin-bottom: 20px; font-size: 14px; line-height: 1.5; }
        
        .module-list { margin: 20px 0; text-align: left; }
        .module-item { background: #313244; padding: 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .module-item:hover { background: #45475a; }
        .delete-btn { background: var(--red); color: #11111b; padding: 5px 10px; font-size: 12px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }
        
        /* Опції */
        .options-group { background: #313244; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: left; }
        .option-row { display: flex; align-items: center; margin-bottom: 15px; cursor: pointer; font-size: 16px; }
        .option-row input { margin-right: 12px; width: 18px; height: 18px; cursor: pointer; }
        
        input[type="text"], textarea { width: 100%; padding: 14px; font-size: 16px; border-radius: 8px; border: 2px solid #313244; background: #313244; color: var(--text); margin-bottom: 15px; outline: none; }
        input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
        textarea { height: 150px; resize: vertical; font-family: monospace; }
        
        button.main-btn { width: 100%; padding: 14px; font-size: 16px; font-weight: bold; background: var(--accent); color: #11111b; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        button.secondary-btn { background: transparent; color: var(--subtext); border: 2px solid #313244; width: 100%; padding: 12px; font-size: 14px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        
        /* Варіанти відповідей (Заучування) */
        .choices-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin: 20px 0; }
        button.choice-btn { background: #313244; color: var(--text); border: 2px solid #45475a; padding: 14px; font-size: 16px; border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.2s; }
        button.choice-btn:hover { background: #45475a; border-color: var(--accent); }
        
        .word { font-size: 26px; font-weight: bold; color: var(--accent); margin-bottom: 25px; line-height: 1.3; }
        .result { font-size: 18px; font-weight: bold; margin-top: 20px; min-height: 26px; }
        .success { color: var(--green); }
        .error { color: var(--red); }
    </style>
</head>
<body>

<div class="card">
    <div id="menu-screen" class="screen active">
        <h2>Твої модулі знань</h2>
        <p>Обери юніт або неправильні дієслова для старту</p>
        <div class="module-list" id="modules-container"></div>
        <button class="main-btn" onclick="switchScreen('create-screen')">+ Додати новий модуль</button>
    </div>

    <div id="setup-screen" class="screen">
        <h2 id="setup-title">Налаштування тренування</h2>
        <div class="options-group">
            <div style="font-weight: bold; margin-bottom: 10px; color: var(--accent);">1. Оберіть режим:</div>
            <label class="option-row"><input type="radio" name="quiz-mode" value="write" checked> 📝 Тест (Впиши відповідь вручну)</label>
            <label class="option-row"><input type="radio" name="quiz-mode" value="choice"> 🕹️ Заучування (Вибір з 4 варіантів)</label>
            
            <div style="font-weight: bold; margin-top: 20px; margin-bottom: 10px; color: var(--accent);">2. Що показувати як запитання:</div>
            <label class="option-row"><input type="radio" name="quiz-lang" value="ua" checked> 🇺🇦 Українське слово (Вгадуй англійську)</label>
            <label class="option-row"><input type="radio" name="quiz-lang" value="en"> 🇬🇧 Англійське слово (Вгадуй переклад)</label>
        </div>
        <button class="main-btn" onclick="generateQuiz()">Почати тренування 🔥</button>
        <button class="secondary-btn" onclick="switchScreen('menu-screen')">Назад до меню</button>
    </div>

    <div id="create-screen" class="screen">
        <h2>Новий модуль</h2>
        <input type="text" id="new-module-name" placeholder="Назва (напр. Unit 1: People)">
        <p style="text-align:left;">Встав слова. Формат: англійська [дефіс] укр_переклад. Кожен рядок з нової лінії.<br>Наприклад:<br><code>car - машина</code><br><code>arise arose arisen - виникати</code></p>
        <textarea id="new-module-words" placeholder="arise arose arisen - виникати&#10;car - машина"></textarea>
        <button class="main-btn" onclick="saveNewModule()">Зберегти модуль</button>
        <button class="secondary-btn" onclick="switchScreen('menu-screen')">Назад до меню</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="quiz-progress" style="color:var(--subtext); margin-bottom:15px; font-size:14px;"></div>
        <div class="word" id="target-word">...</div>
        
        <div id="write-block">
            <input type="text" id="user-input" placeholder="Введіть правильний переклад" autocomplete="off" autocapitalize="none">
        </div>
        
        <div id="choice-block" class="choices-grid"></div>
        
        <button class="main-btn" id="action-btn" onclick="handleQuizSubmit()">Перевірити</button>
        <div class="result" id="result-msg"></div>
        <button class="secondary-btn" onclick="switchScreen('menu-screen')">Перервати</button>
    </div>
</div>

<script>
    const DEFAULT_MODULES = {
        "Демо: Неправильні дієслова": {
            "arise arose arisen": "виникати, з'являтися",
            "awake awoke awoken": "прокидатися",
            "be was were been": "бути",
            "begin began begun": "починати"
        }
    };

    let ALL_DATA = JSON.parse(localStorage.getItem('my_quiz_modules')) || DEFAULT_MODULES;
    let selectedModule = '';
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let isShowingAnswer = false;
    
    // Параметри поточної гри
    let configMode = 'write'; // write або choice
    let configTarget = 'ua'; // яка мова на екрані (запитання)

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'menu-screen') renderMenu();
    }

    function renderMenu() {
        const container = document.getElementById('modules-container');
        container.innerHTML = '';
        Object.keys(ALL_DATA).forEach(name => {
            const item = document.createElement('div');
            item.className = 'module-item';
            item.innerHTML = `
                <span onclick="openSetup('${name}')">📂 <strong>${name}</strong> (${Object.keys(ALL_DATA[name]).length} слів)</span>
                <button class="delete-btn" onclick="deleteModule('${name}', event)">Видалити</button>
            `;
            container.appendChild(item);
        });
    }

    function openSetup(name) {
        selectedModule = name;
        document.getElementById('setup-title').innerText = `Тренажер: ${name}`;
        switchScreen('setup-screen');
    }

    function saveNewModule() {
        const name = document.getElementById('new-module-name').value.trim();
        const text = document.getElementById('new-module-words').value.trim();
        if (!name || !text) return alert('Заповни поля!');

        const lines = text.split('\n');
        const parsedWords = {};

        lines.forEach(line => {
            let parts = line.split(' - ');
            if (parts.length < 2) parts = line.split('-');
            if (parts.length < 2) parts = line.split('\t');

            if (parts.length >= 2) {
                const en = parts[0].trim().replace(/\s+/g, ' ');
                const ua = parts[1].trim();
                if (en && ua) parsedWords[en] = ua;
            }
        });

        ALL_DATA[name] = parsedWords;
        localStorage.setItem('my_quiz_modules', JSON.stringify(ALL_DATA));
        switchScreen('menu-screen');
    }

    function deleteModule(name, event) {
        event.stopPropagation();
        if (confirm(`Видалити модуль "${name}"?`)) {
            delete ALL_DATA[name];
            localStorage.setItem('my_quiz_modules', JSON.stringify(ALL_DATA));
            renderMenu();
        }
    }

    function generateQuiz() {
        configMode = document.querySelector('input[name="quiz-mode"]:checked').value;
        configTarget = document.querySelector('input[name="quiz-lang"]:checked').value;
        
        const originalPairs = Object.entries(ALL_DATA[selectedModule]);
        if (originalPairs.length < 4 && configMode === 'choice') {
            alert('Для заучування з 4 варіантами у модулі має бути хоча б 4 слова!');
            return;
        }

        questions = originalPairs.map(pair => {
            return {
                en: pair[0],
                ua: pair[1],
                question: configTarget === 'ua' ? pair[1] : pair[0],
                answer: configTarget === 'ua' ? pair[0] : pair[1]
            };
        });

        questions.sort(() => Math.random() - 0.5);
        currentIndex = 0;
        score = 0;
        switchScreen('quiz-screen');
        showQuestion();
    }

    function showQuestion() {
        const inputEl = document.getElementById('user-input');
        const msgEl = document.getElementById('result-msg');
        const btnEl = document.getElementById('action-btn');
        const writeBlock = document.getElementById('write-block');
        const choiceBlock = document.getElementById('choice-block');
        
        isShowingAnswer = false;
        msgEl.innerText = '';
        btnEl.innerText = 'Перевірити';
        btnEl.style.display = configMode === 'write' ? 'block' : 'none';

        if (currentIndex < questions.length) {
            const currentObj = questions[currentIndex];
            document.getElementById('quiz-progress').innerText = `Картка ${currentIndex + 1} з ${questions.length} | Рахунок: ${score}`;
            document.getElementById('target-word').innerText = currentObj.question;

            if (configMode === 'write') {
                writeBlock.style.display = 'block';
                choiceBlock.style.display = 'none';
                inputEl.value = '';
                inputEl.disabled = false;
                setTimeout(() => inputEl.focus(), 50);
            } else {
                writeBlock.style.display = 'none';
                choiceBlock.style.display = 'grid';
                generateChoices(currentObj);
            }
        } else {
            const percent = Math.round((score / questions.length) * 100);
            document.getElementById('quiz-screen').innerHTML = `
                <div class="word" style="color: var(--green)">Тест завершено! 🔥</div>
                <div style="font-size:20px; margin-bottom:25px;">Результат: ${score} з ${questions.length}<br>Точність: ${percent}%</div>
                <button class="main-btn" onclick="location.reload()">До головного меню</button>
            `;
        }
    }

    function generateChoices(currentObj) {
        const choiceBlock = document.getElementById('choice-block');
        choiceBlock.innerHTML = '';

        // Збираємо унікальні варіанти обманок
        let pool = questions.map(q => q.answer).filter(ans => ans !== currentObj.answer);
        pool.sort(() => Math.random() - 0.5);
        
        let finalChoices = [currentObj.answer, pool[0], pool[1], pool[2]].filter(Boolean);
        finalChoices.sort(() => Math.random() - 0.5); // перемішуємо самі кнопки

        finalChoices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice;
            btn.onclick = () => selectChoice(btn, choice, currentObj.answer);
            choiceBlock.appendChild(btn);
        });
    }

    function selectChoice(clickedBtn, selectedAnswer, correctAnswer) {
        if (isShowingAnswer) return;
        isShowingAnswer = true;
        
        const msgEl = document.getElementById('result-msg');
        const btnEl = document.getElementById('action-btn');
        btnEl.style.display = 'block';
        btnEl.innerText = 'Далі';

        // Розмальовуємо кнопки
        document.querySelectorAll('.choice-btn').forEach(btn => {
            if (btn.innerText === correctAnswer) {
                btn.style.background = 'var(--green)';
                btn.style.color = '#11111b';
            }
        });

        if (selectedAnswer.toLowerCase() === correctAnswer.toLowerCase()) {
            score++;
            msgEl.className = 'result success';
            msgEl.innerText = '🔥 Правильно! Вперед до дофаміну!';
        } else {
            clickedBtn.style.background = 'var(--red)';
            clickedBtn.style.color = '#11111b';
            msgEl.className = 'result error';
            msgEl.innerText = `❌ Схибив! Правильна відповідь виділена зеленим.`;
        }
    }

    function handleQuizSubmit() {
        if (configMode === 'write') {
            const inputEl = document.getElementById('user-input');
            const msgEl = document.getElementById('result-msg');
            const btnEl = document.getElementById('action-btn');

            if (!isShowingAnswer) {
                const userAns = inputEl.value.trim().toLowerCase().replace(/\s+/g, ' ');
                const correctAns = questions[currentIndex][0] ? questions[currentIndex].answer.toLowerCase() : '';

                inputEl.disabled = true;
                isShowingAnswer = true;

                if (userAns === correctAns) {
                    score++;
                    msgEl.className = 'result success';
                    msgEl.innerText = '🔥 Точно в ціль!';
                } else {
                    msgEl.className = 'result error';
                    msgEl.innerText = `❌ Правильно: ${questions[currentIndex].answer}`;
                }
                btnEl.innerText = 'Далі';
            } else {
                currentIndex++;
                showQuestion();
            }
        } else {
            // Для режиму кнопок кнопка "Далі" просто перемикає картку
            currentIndex++;
            showQuestion();
        }
    }

    document.getElementById('user-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && configMode === 'write') handleQuizSubmit();
    });

    renderMenu();
</script>

</body>
</html>
