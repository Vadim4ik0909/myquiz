<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Квіз-Платформа 120%</title>
    <script src="database.js"></script>
    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #252538;
            --text: #cdd6f4;
            --subtext: #a6adc8;
            --accent: #89b4fa;
            --green: #a6e3a1;
            --red: #f38ba8;
            --orange: #fab387;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; position: relative; }
        .card { background: var(--surface); width: 100%; max-width: 1200px; padding: 30px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 1; display: flex; flex-direction: column; margin-top: 25px; }
        .screen { display: none; text-align: center; width: 100%; }
        .screen.active { display: block; }
        h2 { margin-bottom: 20px; color: var(--accent); }
        p { color: var(--subtext); margin-bottom: 20px; font-size: 14px; line-height: 1.5; }
        .stats-header { display: flex; justify-content: space-between; background: #313244; padding: 14px 20px; border-radius: 10px; margin-bottom: 25px; font-weight: bold; font-size: 16px; width: 100%; }
        .streak-fire { color: var(--orange); animation: pulse 1.5s infinite alternate; }
        .module-list { margin: 25px 0; text-align: left; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .module-item { background: #313244; padding: 20px; border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; gap: 12px; transition: all 0.2s ease; border: 2px solid transparent; min-height: 140px; }
        .module-item:hover { background: #45475a; border-color: var(--accent); transform: translateY(-3px); }
        .module-top { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .module-name-click { font-size: 16px; cursor: pointer; line-height: 1.4; font-weight: bold; }
        .actions-block { display: flex; gap: 8px; margin-top: auto; justify-content: flex-end; }
        .action-btn-small { color: #11111b; padding: 6px 12px; font-size: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        .edit-btn { background: var(--accent); }
        .delete-btn { background: var(--red); }
        .progress-track { width: 100%; background: #1e1e2e; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .progress-bar { background: var(--green); height: 100%; width: 0%; transition: width 0.4s ease; }
        .options-group { background: #313244; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: left; max-width: 600px; margin: 0 auto 20px auto; }
        .option-row { display: flex; align-items: center; margin-bottom: 15px; cursor: pointer; font-size: 16px; }
        .option-row input { margin-right: 12px; width: 18px; height: 18px; }
        input[type="text"], textarea { width: 100%; padding: 14px; font-size: 16px; border-radius: 8px; border: 2px solid #313244; background: #313244; color: var(--text); margin-bottom: 15px; outline: none; }
        input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
        textarea { height: auto; min-height: 150px; max-height: 380px; resize: none; font-family: monospace; }
        button.main-btn { width: 100%; max-width: 400px; padding: 14px; font-size: 16px; font-weight: bold; background: var(--accent); color: #11111b; border: none; border-radius: 8px; cursor: pointer; margin: 10px auto 0 auto; display: block; }
        button.secondary-btn { background: transparent; color: var(--subtext); border: 2px solid #313244; width: 100%; max-width: 400px; padding: 12px; font-size: 14px; border-radius: 8px; cursor: pointer; margin: 10px auto 0 auto; display: block; }
        .choices-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin: 20px auto; max-width: 500px; }
        button.choice-btn { background: #313244; color: var(--text); border: 2px solid #45475a; padding: 14px; font-size: 16px; border-radius: 8px; text-align: center; }
        .word { font-size: 32px; font-weight: bold; color: var(--accent); margin: 25px 0; }
        .result { font-size: 18px; font-weight: bold; margin-top: 20px; min-height: 26px; }
        .success { color: var(--green); }
        .error { color: var(--red); }
        #write-block input { max-width: 500px; margin: 0 auto 15px auto; display: block; text-align: center; }
        .version-tag { position: fixed; bottom: 15px; left: 15px; font-size: 12px; color: var(--subtext); opacity: 0.6; font-family: monospace; }
        .import-zone { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-import { background: var(--orange) !important; color: #11111b !important; }
        .btn-reset { background: #585b70 !important; color: var(--text) !important; }
    </style>
</head>
<body>

<div class="version-tag">v2.9-SmartParser</div>

<div class="card" id="main-card">
    <div id="stats-panel" class="stats-header">
        <span class="streak-fire" id="stat-streak">🔥 0 днів стрік</span>
        <span style="color: var(--accent);" id="stat-total-words">🧠 0 вивчено</span>
    </div>

    <div id="menu-screen" class="screen active">
        <h2>Твої модулі знань</h2>
        <p>Завантажуй файли як є — додаток сам розпізнає номер юніта та назве його за підручником!</p>
        <div class="module-list" id="modules-container"></div>
        
        <div class="import-zone">
            <button class="main-btn btn-import" onclick="document.getElementById('bulk-file-input').click()">📥 Завантажити .txt файли</button>
            <button class="main-btn btn-reset" onclick="clearAllData()">🗑️ Очистити сайт</button>
        </div>
        <input type="file" id="bulk-file-input" multiple accept=".txt" style="display: none;" onchange="handleBulkImport(this)">
    </div>

    <div id="setup-screen" class="screen">
        <h2 id="setup-title">Налаштування тренування</h2>
        <div class="options-group">
            <div style="font-weight: bold; margin-bottom: 10px; color: var(--accent);">1. Оберіть режим:</div>
            <label class="option-row"><input type="radio" name="quiz-mode" value="write" checked> 📝 Тест (Впиши відповідь вручну)</label>
            <label class="option-row"><input type="radio" name="quiz-mode" value="choice"> 🕹️ Заучування (Вибір з 4 варіантів)</label>
            
            <div style="font-weight: bold; margin-top: 20px; margin-bottom: 10px; color: var(--accent);">2. Що показувати як запитання:</div>
            <label class="option-row"><input type="radio" name="quiz-lang" value="ua" checked> 🇺🇦 Українське слово (Вгадуй англійську)</label>
            <label class="option-row"><input type="radio" name="quiz-lang" value="en"> 🇬🇧 Англійське слово (Вгадуй переклад)</label>
        </div>
        <button class="main-btn" onclick="generateQuiz()">Почати тренування 🔥</button>
        <button class="secondary-btn" onclick="switchScreen('menu-screen')">Назад до меню</button>
    </div>

    <div id="create-screen" class="screen">
        <h2 id="create-screen-title">Новий модуль</h2>
        <div style="max-width: 500px; margin: 0 auto;">
            <input type="text" id="new-module-name" placeholder="Назва модуля">
            <textarea id="new-module-words" placeholder="слово - переклад" oninput="autoExpandTextarea(this)"></textarea>
            <button class="main-btn" onclick="saveModule()">Зберегти модуль</button>
            <button class="secondary-btn" onclick="switchScreen('menu-screen')">Назад до меню</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="quiz-progress" style="color:var(--subtext); margin-bottom:15px; font-size:14px;"></div>
        <div class="word" id="target-word">...</div>
        <div id="write-block">
            <input type="text" id="user-input" placeholder="Введіть правильний переклад" autocomplete="off">
        </div>
        <div id="choice-block" class="choices-grid"></div>
        <button class="main-btn" id="action-btn" onclick="handleQuizSubmit()">Перевірити</button>
        <div class="result" id="result-msg"></div>
        <button class="secondary-btn" onclick="switchScreen('menu-screen')">Перервати</button>
    </div>
</div>

<script>
    if (typeof DEFAULT_MODULES === 'undefined') window.DEFAULT_MODULES = {};

    let SAVED_USER_DATA = JSON.parse(localStorage.getItem('my_quiz_modules')) || {};
    let ALL_DATA = Object.assign({}, DEFAULT_MODULES, SAVED_USER_DATA);

    let MEMORY_STATS = JSON.parse(localStorage.getItem('my_quiz_mem_stats')) || {};
    let STREAK_DATA = JSON.parse(localStorage.getItem('my_quiz_streak')) || { count: 0, lastDate: "" };

    let selectedModule = ''; let questions = []; let currentIndex = 0; let score = 0;
    let isShowingAnswer = false; let configMode = 'write'; let configTarget = 'ua'; let editingModuleOriginalName = '';

    const BOOK_TITLES = {
        "1": "Unit 1: People and communities",
        "2": "Unit 2: Housing and home environment",
        "3": "Unit 3: School and education",
        "4": "Unit 4: Work and career",
        "5": "Unit 5: Family and social life",
        "6": "Unit 6: Food and nutrition",
        "7": "Unit 7: Shopping and services",
        "8": "Unit 8: Travelling and tourism",
        "10": "Unit 10: Sport and fitness",
        "11": "Unit 11: Health and medical care",
        "12": "Unit 12: Science and technology",
        "13": "Unit 13: Nature and environment",
        "14": "Unit 14: Society and law",
        "15": "Unit 15: Global English / Culture"
    };

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const targetScreen = document.getElementById(screenId);
        if (targetScreen) targetScreen.classList.add('active');
        const statsPanel = document.getElementById('stats-panel');
        if (screenId === 'menu-screen') {
            if (statsPanel) statsPanel.style.display = 'flex';
            updateStreakAndGlobalStats();
            renderMenu();
        } else {
            if (statsPanel && screenId === 'quiz-screen') statsPanel.style.display = 'none';
        }
    }

    function autoExpandTextarea(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    // УЛЬТРА-СМАРТ ІМПОРТЕР: Йому байдуже на назву файлу, він дивиться на цифри всередині імені!
    function handleBulkImport(input) {
        const files = input.files;
        if (files.length === 0) return;

        let loadedCount = 0;
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();
            
            let unitNumber = file.name.match(/\d+/)?.[0];
            let moduleName = (unitNumber && BOOK_TITLES[unitNumber]) ? BOOK_TITLES[unitNumber] : file.name.replace('.txt', '').replace(/_/g, ' ');

            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split('\n');
                const parsedWords = {};

                lines.forEach(line => {
                    let parts = line.split('\t');
                    if (parts.length < 2) parts = line.split(' - ');
                    if (parts.length < 2) parts = line.split('-');

                    if (parts.length >= 2) {
                        const en = parts[0].trim().replace(/\s+/g, ' ');
                        const ua = parts[1].trim();
                        if (en && ua && !en.startsWith('[source')) {
                            parsedWords[en] = ua;
                        }
                    }
                });

                if (Object.keys(parsedWords).length > 0) {
                    ALL_DATA[moduleName] = parsedWords;
                    SAVED_USER_DATA[moduleName] = parsedWords;
                }

                loadedCount++;
                if (loadedCount === files.length) {
                    localStorage.setItem('my_quiz_modules', JSON.stringify(SAVED_USER_DATA));
                    alert(`🚀 Автоімпорт завершено! Синхронізовано модулів: ${loadedCount}. Назви вирівняно за книжкою.`);
                    renderMenu();
                }
            };
            reader.readAsText(file);
        }
    }

    function clearAllData() {
        if (confirm('Повністю очистити додаток та видалити прогрес?')) {
            localStorage.clear();
            SAVED_USER_DATA = {}; ALL_DATA = {}; MEMORY_STATS = {}; STREAK_DATA = { count: 0, lastDate: "" };
            renderMenu(); updateStreakAndGlobalStats();
        }
    }

    function renderMenu() {
        const container = document.getElementById('modules-container');
        if (!container) return;
        container.innerHTML = '';
        
        const sortedKeys = Object.keys(ALL_DATA).sort((a, b) => {
            let numA = parseInt(a.match(/\d+/)?.[0]) || 999;
            let numB = parseInt(b.match(/\d+/)?.[0]) || 999;
            return numA - numB;
        });

        sortedKeys.forEach(name => {
            const progress = calculateModuleProgress(name);
            const item = document.createElement('div');
            item.className = 'module-item';
            const encodedId = btoa(encodeURIComponent(name)).replace(/=/g, "");
            
            item.innerHTML = `
                <div class="module-top" id="click-${encodedId}">
                    <div class="module-name-click">
                        📂 <strong>${name}</strong>
                        <div style="font-size:13px; color:var(--subtext); margin-top:5px;">${Object.keys(ALL_DATA[name]).length} картка(ок)</div>
                    </div>
                </div>
                <div>
                    <div style="font-size: 11px; color: var(--subtext); display:flex; justify-content:space-between; margin-bottom:4px;">
                        <span>Заучено:</span>
                        <span style="font-weight:bold; color:var(--green);">${progress}%</span>
                    </div>
                    <div class="progress-track"><div class="progress-bar" style="width: ${progress}%"></div></div>
                </div>
                <div class="actions-block">
                    <button class="action-btn-small edit-btn" id="edit-${encodedId}">✏️</button>
                    <button class="action-btn-small delete-btn" id="del-${encodedId}">❌</button>
                </div>
            `;
            container.appendChild(item);
            document.getElementById(`click-${encodedId}`).onclick = () => openSetup(name);
            document.getElementById(`edit-${encodedId}`).onclick = () => openEditScreen(name);
            document.getElementById(`del-${encodedId}`).onclick = (e) => deleteModule(name, e);
        });
    }

    function openEditScreen(name) {
        editingModuleOriginalName = name;
        document.getElementById('create-screen-title').innerText = '✏️ Редагування модуля';
        document.getElementById('new-module-name').value = name;
        let wordsText = '';
        Object.entries(ALL_DATA[name]).forEach(([en, ua]) => { wordsText += `${en} - ${ua}\n`; });
        document.getElementById('new-module-words').value = wordsText.trim();
        switchScreen('create-screen');
    }

    function openSetup(name) { selectedModule = name; document.getElementById('setup-title').innerText = `Тренажер: ${name}`; switchScreen('setup-screen'); }

    function saveModule() {
        const name = document.getElementById('new-module-name').value.trim();
        const text = document.getElementById('new-module-words').value.trim();
        if (!name || !text) return;
        const parsedWords = {};
        text.split('\n').forEach(line => {
            let parts = line.split(' - ');
            if (parts.length >= 2) parsedWords[parts[0].trim()] = parts[1].trim();
        });
        if (editingModuleOriginalName && editingModuleOriginalName !== name) {
            delete ALL_DATA[editingModuleOriginalName]; delete SAVED_USER_DATA[editingModuleOriginalName];
        }
        ALL_DATA[name] = parsedWords; SAVED_USER_DATA[name] = parsedWords;
        localStorage.setItem('my_quiz_modules', JSON.stringify(SAVED_USER_DATA));
        switchScreen('menu-screen');
    }

    function deleteModule(name, event) {
        if (event) event.stopPropagation();
        if (confirm(`Видалити "${name}"?`)) {
            delete ALL_DATA[name]; delete SAVED_USER_DATA[name];
            localStorage.setItem('my_quiz_modules', JSON.stringify(SAVED_USER_DATA));
            renderMenu();
        }
    }

    function calculateModuleProgress(name) {
        const wordPairs = Object.keys(ALL_DATA[name]); if (wordPairs.length === 0) return 0;
        let fullyLearned = 0;
        wordPairs.forEach(enWord => {
            const statKey = `${name}_${enWord}`;
            if (MEMORY_STATS[statKey] && MEMORY_STATS[statKey].score <= 0 && MEMORY_STATS[statKey].history?.length > 0) {
                if (MEMORY_STATS[statKey].history[MEMORY_STATS[statKey].history.length - 1] === true) fullyLearned++;
            }
        });
        return Math.round((fullyLearned / wordPairs.length) * 100);
    }

    function updateStreakAndGlobalStats() {
        const todayStr = new Date().toDateString();
        if (STREAK_DATA.lastDate !== todayStr && STREAK_DATA.lastDate) {
            const diffDays = Math.ceil(Math.abs(new Date(todayStr) - new Date(STREAK_DATA.lastDate)) / (1000 * 60 * 60 * 24));
            if (diffDays > 1) STREAK_DATA.count = 0;
            localStorage.setItem('my_quiz_streak', JSON.stringify(STREAK_DATA));
        }
        document.getElementById('stat-streak').innerText = `🔥 ${STREAK_DATA.count} днів стрік`;
        let totalLearned = Object.values(MEMORY_STATS).filter(m => m.history?.filter(v => v === true).length >= 2 && m.score <= 0).length;
        document.getElementById('stat-total-words').innerText = `🧠 ${totalLearned} вивчено`;
    }

    function generateQuiz() {
        configMode = document.querySelector('input[name="quiz-mode"]:checked').value;
        configTarget = document.querySelector('input[name="quiz-lang"]:checked').value;
        const originalPairs = Object.entries(ALL_DATA[selectedModule]);
        let pool = [];
        originalPairs.forEach(pair => {
            const statKey = `${selectedModule}_${pair[0]}`;
            const wordStat = MEMORY_STATS[statKey] || { score: 2, history: [] };
            let weight = Math.max(1, wordStat.score);
            for (let i = 0; i < weight; i++) {
                pool.push({ en: pair[0], ua: pair[1], question: configTarget === 'ua' ? pair[1] : pair[0], answer: configTarget === 'ua' ? pair[0] : pair[1] });
            }
        });
        pool.sort(() => Math.random() - 0.5);
        questions = []; let usedEn = new Set();
        pool.forEach(item => { if (!usedEn.has(item.en)) { questions.push(item); usedEn.add(item.en); } });
        questions = questions.slice(0, originalPairs.length);
        currentIndex = 0; score = 0;
        switchScreen('quiz-screen'); showQuestion();
    }

    function showQuestion() {
        const inputEl = document.getElementById('user-input'); const msgEl = document.getElementById('result-msg');
        const btnEl = document.getElementById('action-btn'); const writeBlock = document.getElementById('write-block'); const choiceBlock = document.getElementById('choice-block');
        isShowingAnswer = false; if (msgEl) msgEl.innerText = '';
        if (btnEl) { btnEl.innerText = 'Перевірити'; btnEl.style.display = configMode === 'write' ? 'block' : 'none'; }
        if (currentIndex < questions.length) {
            const currentObj = questions[currentIndex];
            document.getElementById('quiz-progress').innerText = `Картка ${currentIndex + 1} з ${questions.length} | Рахунок: ${score}`;
            document.getElementById('target-word').innerText = currentObj.question;
            if (configMode === 'write') {
                writeBlock.style.display = 'block'; choiceBlock.style.display = 'none';
                if (inputEl) { inputEl.value = ''; inputEl.disabled = false; setTimeout(() => inputEl.focus(), 20); }
            } else {
                writeBlock.style.display = 'none'; choiceBlock.style.display = 'grid'; generateChoices(currentObj);
            }
        } else {
            const todayStr = new Date().toDateString();
            if (STREAK_DATA.lastDate !== todayStr) { STREAK_DATA.count += 1; STREAK_DATA.lastDate = todayStr; localStorage.setItem('my_quiz_streak', JSON.stringify(STREAK_DATA)); }
            document.getElementById('quiz-screen').innerHTML = `<div class="word" style="color: var(--green)">Раунд закритий! 🔥</div><div style="font-size:20px; margin-bottom:10px;">Рахунок: ${score} з ${questions.length}</div><button class="main-btn" onclick="location.reload()">Повернутися до меню</button>`;
        }
    }

    function generateChoices(currentObj) {
        const choiceBlock = document.getElementById('choice-block'); choiceBlock.innerHTML = '';
        let allAnswersPool = Object.entries(ALL_DATA[selectedModule]).map(pair => configTarget === 'ua' ? pair[0] : pair[1]);
        let pool = allAnswersPool.filter(ans => ans.toLowerCase() !== currentObj.answer.toLowerCase()).sort(() => Math.random() - 0.5);
        let finalChoices = [currentObj.answer, pool[0], pool[1], pool[2]].filter(Boolean).sort(() => Math.random() - 0.5);
        finalChoices.forEach(choice => {
            const btn = document.createElement('button'); btn.className = 'choice-btn'; btn.innerText = choice;
            btn.onclick = () => selectChoice(btn, choice, currentObj.answer); choiceBlock.appendChild(btn);
        });
    }

    function selectChoice(clickedBtn, selectedAnswer, correctAnswer) {
        if (isShowingAnswer) return; isShowingAnswer = true;
        const msgEl = document.getElementById('result-msg'); const btnEl = document.getElementById('action-btn');
        if (btnEl) { btnEl.style.display = 'block'; btnEl.innerText = 'Далі'; }
        document.querySelectorAll('.choice-btn').forEach(btn => { if (btn.innerText.toLowerCase() === correctAnswer.toLowerCase()) { btn.style.background = 'var(--green)'; btn.style.color = '#11111b'; } });
        const isCorrect = selectedAnswer.toLowerCase() === correctAnswer.toLowerCase();
        updateMemoryAlgorithm(questions[currentIndex], isCorrect);
        if (isCorrect) { score++; msgEl.className = 'result success'; msgEl.innerText = '🔥 Правильно!'; }
        else { clickedBtn.style.background = 'var(--red)'; clickedBtn.style.color = '#11111b'; msgEl.className = 'result error'; msgEl.innerText = `❌ Схибив!`; }
    }

    function handleQuizSubmit() {
        if (configMode === 'write') {
            const inputEl = document.getElementById('user-input'); const msgEl = document.getElementById('result-msg'); const btnEl = document.getElementById('action-btn');
            const currentObj = questions[currentIndex];
            if (!isShowingAnswer) {
                const userAns = inputEl.value.trim().toLowerCase().replace(/\s+/g, ' ');
                const isCorrect = userAns === currentObj.answer.toLowerCase();
                inputEl.disabled = true; isShowingAnswer = true;
                updateMemoryAlgorithm(currentObj, isCorrect);
                if (isCorrect) { score++; msgEl.className = 'result success'; msgEl.innerText = '🔥 Точно в ціль!'; }
                else { msgEl.className = 'result error'; msgEl.innerText = `❌ Правильно: ${currentObj.answer}`; }
                btnEl.innerText = 'Далі';
            } else { currentIndex++; showQuestion(); }
        } else { currentIndex++; showQuestion(); }
    }

    function updateMemoryAlgorithm(currentObj, isCorrect) {
        const statKey = `${selectedModule}_${currentObj.en}`;
        if (!MEMORY_STATS[statKey]) MEMORY_STATS[statKey] = { score: 2, history: [] };
        MEMORY_STATS[statKey].score = isCorrect ? Math.max(0, MEMORY_STATS[statKey].score - 1) : MEMORY_STATS[statKey].score + 2;
        MEMORY_STATS[statKey].history.push(isCorrect); if (MEMORY_STATS[statKey].history.length > 5) MEMORY_STATS[statKey].history.shift();
        localStorage.setItem('my_quiz_mem_stats', JSON.stringify(MEMORY_STATS));
    }

    async function loadAllModules() {
        const files = [
            "Unit 1.txt", "Unit 2.txt", "Unit 3.txt", "Unit 4.txt", "Unit 5.txt",
            "Unit 6.txt", "Unit 7.txt", "Unit 8.txt", "Unit 10.txt", "Unit 11.txt",
            "Unit 12.txt", "Unit 13.txt", "Unit 14.txt", "Unit 15.txt"
        ];
        
        const BOOK_TITLES = {
            "1": "Unit 1: People and communities", "2": "Unit 2: Housing and home environment",
            "3": "Unit 3: School and education", "4": "Unit 4: Work and career",
            "5": "Unit 5: Family and social life", "6": "Unit 6: Food and nutrition",
            "7": "Unit 7: Shopping and services", "8": "Unit 8: Travelling and tourism",
            "10": "Unit 10: Sport and fitness", "11": "Unit 11: Health and medical care",
            "12": "Unit 12: Science and technology", "13": "Unit 13: Nature and environment",
            "14": "Unit 14: Society and law", "15": "Unit 15: Global English / Culture"
        };

        // Завантажуємо лише якщо база порожня, щоб не перезаписувати твій прогрес кожного разу
        if (Object.keys(SAVED_USER_DATA).length === 0) {
            for (let f of files) {
                try {
                    let res = await fetch('modules/' + f);
                    let text = await res.text();
                    let lines = text.split('\n');
                    let words = {};
                    lines.forEach(l => { 
                        let p = l.split('\t'); 
                        if(p.length < 2) p = l.split(' - '); 
                        if(p.length >= 2) words[p[0].trim()] = p[1].trim(); 
                    });
                    let unitNum = f.match(/\d+/)[0];
                    if (BOOK_TITLES[unitNum]) {
                        SAVED_USER_DATA[BOOK_TITLES[unitNum]] = words;
                    }
                } catch(e) { console.warn("Файл " + f + " не знайдено в папці modules/"); }
            }
            localStorage.setItem('my_quiz_modules', JSON.stringify(SAVED_USER_DATA));
            ALL_DATA = Object.assign({}, DEFAULT_MODULES, SAVED_USER_DATA);
        }
    }

    window.onload = async function() { 
        await loadAllModules();
        switchScreen('menu-screen'); 
    };
</script>
</body>
</html>
